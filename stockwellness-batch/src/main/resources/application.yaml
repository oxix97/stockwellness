spring:
  profiles:
    active: local
  config:
    import: "optional:classpath:application-core.yaml"

  batch:
    job:
      enabled: true

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

server:
  port: ${SERVER_PORT:8081}
