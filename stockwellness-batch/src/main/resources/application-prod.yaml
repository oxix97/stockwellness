spring:
  config:
    import:
      - "optional:classpath:application-core.yaml"
      - "optional:classpath:application-core-prod.yaml"   # prod 전용 core 오버라이드

  batch:
    job:
      enabled: false   # 배치 잡은 스케줄러/API로만 실행 (자동 실행 방지)

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

# prod에서는 p6spy SQL 로깅 비활성화
decorator:
  datasource:
    p6spy:
      enable-logging: false

logging:
  level:
    root: WARN
    org.stockwellness: INFO
    org.springframework.web.client.RestClient: WARN
    org.springframework.ai: WARN
    org.apache.hc.client5.http: WARN
    p6spy: OFF
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.springframework.batch: INFO
    org.springframework.transaction: WARN
