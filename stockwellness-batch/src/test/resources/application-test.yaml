spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  docker:
    compose:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092

resilience4j:
  ratelimiter:
    instances:
      kisRateLimiter:
        timeout-duration: 0ms
        limit-for-period: 1000
        limit-refresh-period: 1s

management:
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
