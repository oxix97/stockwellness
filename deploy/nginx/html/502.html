<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 점검 중 — Stockwellness</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #2EBE7A;
            --green-light: #E8F9F1;
            --green-mid: #1a9e62;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --bg: #f7fdfb;
        }

        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 배경 장식 원들 */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            background: var(--green);
            pointer-events: none;
        }
        .bg-circle-1 { width: 600px; height: 600px; top: -200px; right: -150px; }
        .bg-circle-2 { width: 400px; height: 400px; bottom: -150px; left: -100px; }
        .bg-circle-3 { width: 200px; height: 200px; top: 40%; left: 5%; opacity: 0.05; }

        /* 배경 차트 라인 장식 */
        .bg-chart {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            opacity: 0.06;
        }

        /* 카드 */
        .card {
            background: #fff;
            border-radius: 28px;
            padding: 56px 64px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(46, 190, 122, 0.10), 0 2px 12px rgba(0,0,0,0.06);
            position: relative;
            z-index: 10;
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 로고 영역 */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--green), var(--green-mid));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(46,190,122,0.35);
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--green);
        }

        /* 아이콘 배지 */
        .badge {
            width: 80px;
            height: 80px;
            background: var(--green-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46,190,122,0.25); }
            50%       { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(46,190,122,0); }
        }

        .badge svg {
            width: 40px;
            height: 40px;
            color: var(--green);
        }

        /* 텍스트 */
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.8px;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.75;
            margin-bottom: 36px;
        }

        /* 타이머 박스 */
        .timer-box {
            background: var(--green-light);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .timer-label {
            font-size: 14px;
            color: var(--green-mid);
            font-weight: 500;
        }

        .timer-count {
            font-size: 32px;
            font-weight: 700;
            color: var(--green);
            font-variant-numeric: tabular-nums;
            min-width: 56px;
            display: inline-block;
            letter-spacing: -1px;
        }

        .timer-unit {
            font-size: 14px;
            color: var(--green-mid);
            font-weight: 500;
        }

        /* 진행 바 */
        .progress-wrap {
            background: #e5e7eb;
            border-radius: 100px;
            height: 6px;
            width: 100%;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #5dd4a4);
            border-radius: 100px;
            width: 100%;
            transform-origin: left;
            animation: countdown 180s linear forwards;
        }

        @keyframes countdown {
            from { width: 100%; }
            to   { width: 0%; }
        }

        /* 안내 메모 */
        .note {
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.6;
        }

        .note strong {
            color: var(--text-secondary);
        }

        /* 구분선 */
        .divider {
            width: 40px;
            height: 3px;
            background: var(--green);
            border-radius: 100px;
            margin: 0 auto 32px;
            opacity: 0.4;
        }

        /* 하단 푸터 */
        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #c4c4c4;
            z-index: 10;
            position: relative;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            .card { padding: 40px 28px; }
            h1 { font-size: 22px; }
            .timer-count { font-size: 26px; }
        }
    </style>
</head>
<body>

    <!-- 배경 장식 -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <!-- 배경 차트 SVG -->
    <svg class="bg-chart" viewBox="0 0 1440 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline
            points="0,180 120,160 240,170 360,120 480,140 600,90 720,110 840,60 960,80 1080,40 1200,65 1320,30 1440,50"
            stroke="#2EBE7A" stroke-width="3" fill="none" />
        <polyline
            points="0,200 120,185 240,195 360,155 480,170 600,125 720,145 840,100 960,115 1080,80 1200,100 1320,70 1440,85"
            stroke="#2EBE7A" stroke-width="1.5" fill="none" opacity="0.5" />
    </svg>

    <!-- 메인 카드 -->
    <div class="card">

        <!-- 로고 -->
        <div class="logo-wrap">
            <div class="logo-icon">
                <!-- 차트 + 하트 조합 아이콘 -->
                <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polyline points="2,18 7,12 11,15 16,7 20,10 24,4"
                        stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13 22 C13 22 8 18.5 8 15.5 C8 13.5 9.5 12 11.5 12.5 C12.3 12.7 13 13.3 13 13.3 C13 13.3 13.7 12.7 14.5 12.5 C16.5 12 18 13.5 18 15.5 C18 18.5 13 22 13 22Z"
                        fill="white" opacity="0.9"/>
                </svg>
            </div>
            <div class="logo-text">Stock<span>wellness</span></div>
        </div>

        <!-- 점검 아이콘 배지 -->
        <div class="badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
        </div>

        <h1>서비스 점검 중입니다</h1>
        <div class="divider"></div>

        <p class="desc">
            더 나은 투자 건강 서비스를 위해<br/>
            시스템을 업데이트하고 있습니다.<br/>
            잠시 후 다시 만나요! 🌱
        </p>

        <!-- 타이머 -->
        <div class="timer-box">
            <span class="timer-label">자동 새로고침까지</span>
            <span class="timer-count" id="timer">180</span>
            <span class="timer-unit">초</span>
        </div>

        <!-- 진행 바 -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <p class="note">
            <strong>새로고침 버튼을 누르지 마시고</strong><br/>
            카운트다운이 끝나면 자동으로 페이지가 갱신됩니다.
        </p>
    </div>

    <div class="footer">© 2026 Stockwellness. All rights reserved.</div>

    <script>
        var total = 180;
        var sec = total;

        var timerEl = document.getElementById('timer');
        var progressEl = document.getElementById('progress-bar');

        var interval = setInterval(function () {
            sec--;
            timerEl.textContent = sec;

            // 진행 바를 JS로도 동기화 (CSS 애니메이션 보조)
            var pct = (sec / total) * 100;
            progressEl.style.width = pct + '%';

            if (sec <= 0) {
                clearInterval(interval);
                location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
