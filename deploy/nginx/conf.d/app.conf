# ================================================================
# nginx Blue-Green 라우팅 설정
# 경로: /home/chan/stockwellness/deploy/nginx/conf.d/app.conf
#
# 배포 스크립트(deploy-api.sh)가 upstream 블록을 자동으로 교체합니다.
# 수동으로 편집하지 마세요.
#
# ACTIVE_SLOT=blue  → upstream: 8080
# ACTIVE_SLOT=green → upstream: 8082
# ================================================================

# ── 현재 활성 슬롯 upstream ──────────────────────────────────────
# [AUTO-MANAGED] 배포 스크립트가 아래 포트를 교체합니다.
upstream stockwellness_api {
    server stockwellness-api-blue:8080;   # BLUE_ACTIVE
    keepalive 32;
}

# ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────────
server {
    listen 80;
    server_name _;

    location /health {
        # nginx 자체 헬스체크 (로드밸런서용)
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 서버 ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 프록시 공통 헤더
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;

    # ── API 라우팅 ──────────────────────────────────────────────
    location / {
        proxy_pass http://stockwellness_api;
    }

    # ── Actuator 엔드포인트 외부 차단 ──────────────────────────
    location /actuator {
        deny all;
    }
}
