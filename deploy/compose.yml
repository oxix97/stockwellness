# ================================================================
# StockWellness Production Stack
# 경로: /home/chan/stockwellness-infra/compose.yml
#
# 실행:  docker compose up -d
# ================================================================

name: stockwellness

networks:
  stockwellness-net:
    driver: bridge

services:

  # ── PostgreSQL (공유 DB — Blue/Green 공용) ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: stockwellness-postgres
    restart: unless-stopped
    networks: [ stockwellness-net ]
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # 서버 localhost에서만 접근 가능
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (공유 캐시 — Blue/Green 공용) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockwellness-redis
    restart: unless-stopped
    networks: [ stockwellness-net ]
    volumes:
      - ./volumes/redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # ── Zookeeper (Kafka용) ────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: stockwellness-zookeeper
    restart: unless-stopped
    networks: [ stockwellness-net ]
    volumes:
      - ./volumes/zookeeper-data:/bitnami/zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    healthcheck:
      test: [ "CMD-SHELL", "zkServer.sh status" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kafka (메시지 브로커) ───────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: stockwellness-kafka
    restart: unless-stopped
    networks: [ stockwellness-net ]
    volumes:
      - ./volumes/kafka-data:/bitnami/kafka
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    depends_on:
      zookeeper: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── API Blue 슬롯 (포트 8888) ────────────────────────────────────
  stockwellness-api-blue:
    image: ${IMAGE_API}:${API_TAG_BLUE:-latest}
    container_name: stockwellness-api-blue
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "8888:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: stockwellness-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── API Green 슬롯 (포트 8889) ───────────────────────────────────
  stockwellness-api-green:
    image: ${IMAGE_API}:${API_TAG_GREEN:-latest}
    container_name: stockwellness-api-green
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "8889:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: stockwellness-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles: [ green ]   # 기본적으로 비활성 — 배포 중에만 시작됨

  # ── Batch (단순 재시작 방식 — Blue-Green 불필요) ──────────────────
  stockwellness-batch:
    image: ${IMAGE_BATCH}:${BATCH_TAG:-latest}
    container_name: stockwellness-batch
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: stockwellness-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    # [수정] Batch는 HTTP 서버가 없으므로 헬스체크 제거

  # ── Front-End Blue 슬롯 (포트 5555) ──────────────────────────────
  stockwellness-front-blue:
    image: ghcr.io/${REPO_OWNER}/stockwellness-front:${FRONT_TAG_BLUE:-latest}
    container_name: stockwellness-front-blue
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "5555:80"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 80 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Front-End Green 슬롯 (포트 5556) ─────────────────────────────
  stockwellness-front-green:
    image: ghcr.io/${REPO_OWNER}/stockwellness-front:${FRONT_TAG_GREEN:-latest}
    container_name: stockwellness-front-green
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "5556:80"
    profiles: [ front-green ]   # 기본적으로 비활성 — 배포 중에만 시작됨
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 80 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── nginx (라우터 — Blue/Green 전환 담당) ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: stockwellness-nginx
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro  # 502 에러 페이지
    depends_on:
      - stockwellness-api-blue
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── n8n (Blue-Green 배포 오케스트레이터) ─────────────────────────
  # 역할: GitHub Actions 웹훅 수신 → Blue-Green 배포 실행 → 알림
  # 접근: Tailscale IP:5678 (외부 인터넷 노출 없음)
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n       # docker-cli 포함 커스텀 이미지
    container_name: stockwellness-n8n
    group_add:
      - "988"                          # 호스트의 docker 그룹 GID (docker.sock 접근 권한)
    restart: unless-stopped
    networks: [ stockwellness-net ]
    ports:
      - "5678:5678"   # ufw로 외부 차단 — Tailscale IP만 허용
    volumes:
      - ./volumes/n8n-data:/home/node/.n8n
      - ..:/app                                   # 프로젝트 루트 마운트 (Git Pull용)
      - .:/home/chan/stockwellness-infra          # 배포 디렉토리 전체 마운트 (스크립트 + compose + nginx conf)
      - /var/run/docker.sock:/var/run/docker.sock # Docker 직접 제어
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      NODES_EXCLUDE: "[]"

      # 배포 스크립트에서 참조할 환경변수
      DEPLOY_DIR: /home/chan/stockwellness-infra
      REGISTRY: ghcr.io
      REPO_OWNER: ${REPO_OWNER}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      SLACK_WEBHOOK_URL_API: ${SLACK_WEBHOOK_URL_API}
      SLACK_WEB_HOOK_URL_BATCH: ${SLACK_WEB_HOOK_URL_BATCH}

    depends_on:
      postgres: { condition: service_healthy }
