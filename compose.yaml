services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
  redis:
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    image: 'bitnami/redis:latest'
    ports:
      - '6379:6379'
