openapi: 3.0.1
info:
  title: Stockwellness API
  description: 자산 배분 시뮬레이터 및 AI 예측 서비스 API 명세서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: 로그인
      description: 소셜 로그인 정보를 통해 액세스 토큰 및 리프레시 토큰을 발급받습니다.
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              auth-login:
                value: |-
                  {
                    "email" : "test@example.com",
                    "nickname" : "tester",
                    "loginType" : "GOOGLE"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                auth-login:
                  value: |-
                    {
                      "accessToken" : "access.token.dummy",
                      "refreshToken" : "refresh.token.dummy",
                      "memberId" : 1,
                      "email" : "test@example.com",
                      "nickname" : "tester"
                    }
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 서버에서 리프레시 토큰을 삭제합니다.
      operationId: auth-logout
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
  /api/v1/auth/reissue:
    post:
      tags:
      - Auth
      summary: 토큰 재발급
      description: 리프레시 토큰을 사용하여 새로운 액세스 토큰을 발급받습니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReissueRequest"
            examples:
              auth-reissue:
                value: |-
                  {
                    "refreshToken" : "refresh.token.dummy"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReissueResponse"
              examples:
                auth-reissue:
                  value: |-
                    {
                      "accessToken" : "new.access.token",
                      "refreshToken" : "new.refresh.token"
                    }
  /api/v1/sectors/{sectorCode}:
    get:
      tags:
      - Sector
      summary: 섹터 상세 정보 조회
      description: "특정 섹터의 상세 인사이트, 기술적 지표, 주도주 정보를 조회합니다."
      operationId: sector-detail
      parameters:
      - name: sectorCode
        in: path
        description: 섹터 코드
        required: true
        schema:
          type: string
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorDetailResponse"
              examples:
                sector-detail:
                  value: |-
                    {
                      "sectorCode" : "001",
                      "sectorName" : "조선/해운",
                      "baseDate" : "2026-02-26",
                      "currentPrice" : 2500.5,
                      "fluctuationRate" : 3.45,
                      "technicalIndicators" : {
                        "ma5" : 2400.0,
                        "ma20" : 2350.0,
                        "ma60" : null,
                        "ma120" : null,
                        "rsi14" : 65.5,
                        "macd" : null,
                        "macdSignal" : null
                      },
                      "isOverheated" : true,
                      "diagnosisMessage" : "현재 섹터는 과열 구간에 진입했습니다. 과매수 상태입니다.",
                      "leadingStocks" : [ {
                        "name" : "삼성중공업",
                        "ticker" : "010140",
                        "fluctuationRate" : 5.2,
                        "tradeVolume" : 1500000,
                        "transactionAmt" : 12000000000
                      } ]
                    }
  /api/v1/stocks/new-listings:
    get:
      tags:
      - Stock Discovery
      summary: 신규 상장 종목 조회
      description: 신규 상장 종목 조회
      operationId: stock-new-listings
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-new-listings686579750"
              examples:
                stock-new-listings:
                  value: |-
                    [ {
                      "ticker" : "T1",
                      "name" : "New Stock",
                      "marketType" : "KOSPI",
                      "sectorName" : "기타",
                      "status" : "ACTIVE"
                    } ]
  /api/v1/stocks/popular:
    get:
      tags:
      - Stock Discovery
      summary: 인기 검색어 조회
      description: 인기 검색어 조회
      operationId: stock-popular-search
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-popular1050024950"
              examples:
                stock-popular-search:
                  value: "[ \"삼성전자\", \"애플\", \"엔비디아\" ]"
  /api/v1/stocks/search:
    get:
      tags:
      - Stock Discovery
      summary: 종목 통합 검색
      description: 티커 또는 종목명으로 주식을 검색합니다.
      operationId: stock-search
      parameters:
      - name: keyword
        in: query
        description: 검색어 (티커 또는 종목명)
        required: true
        schema:
          type: string
      - name: marketType
        in: query
        description: "마켓 타입 (KOSPI, KOSDAQ 등)"
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: "종목 상태 (ACTIVE, HALTED 등)"
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: 페이지 번호 (0부터 시작)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 사이즈
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-search412068969"
              examples:
                stock-search:
                  value: |-
                    {
                      "content" : [ {
                        "ticker" : "005930",
                        "name" : "삼성전자",
                        "marketType" : "KOSPI",
                        "sectorName" : "전기전자",
                        "status" : "ACTIVE"
                      } ],
                      "pageable" : "INSTANCE",
                      "size" : 1,
                      "number" : 0,
                      "sort" : {
                        "empty" : true,
                        "unsorted" : true,
                        "sorted" : false
                      },
                      "numberOfElements" : 1,
                      "first" : true,
                      "last" : true,
                      "empty" : false
                    }
  /api/v1/watchlist/groups:
    get:
      tags:
      - Watchlist
      summary: 관심 그룹 목록 조회
      description: 관심 그룹 목록 조회
      operationId: watchlist-group-list
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-watchlist-groups1466762393"
              examples:
                watchlist-group-list:
                  value: |-
                    [ {
                      "id" : 10,
                      "name" : "기본 그룹",
                      "itemCount" : 2
                    }, {
                      "id" : 11,
                      "name" : "테크주",
                      "itemCount" : 5
                    } ]
    post:
      tags:
      - Watchlist
      summary: 관심 그룹 생성
      description: 관심 그룹 생성
      operationId: watchlist-group-create
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api-v1-watchlist-groups288370516"
            examples:
              watchlist-group-create:
                value: |-
                  {
                    "name" : "내 관심 그룹"
                  }
      responses:
        "201":
          description: "201"
  /api/v1/sectors/ranking/fluctuation:
    get:
      tags:
      - Sector
      summary: 섹터 등락률 랭킹 조회
      description: 지정된 날짜의 섹터별 등락률 순위를 조회합니다.
      operationId: sector-ranking
      parameters:
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        description: "시장 구분 (KOSPI, KOSDAQ)"
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: 조회 개수
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorRankingResponse"
              examples:
                sector-ranking:
                  value: |-
                    [ {
                      "sectorCode" : "001",
                      "sectorName" : "종합",
                      "currentPrice" : 2500.5,
                      "fluctuationRate" : 3.45,
                      "isOverheated" : false
                    }, {
                      "sectorCode" : "002",
                      "sectorName" : "반도체",
                      "currentPrice" : 1200.3,
                      "fluctuationRate" : -1.2,
                      "isOverheated" : true
                    } ]
  /api/v1/sectors/ranking/supply:
    get:
      tags:
      - Sector
      summary: 섹터 수급 랭킹 조회
      description: 외국인/기관 순매수 금액 및 연속 매수 일수 기반의 섹터 순위를 조회합니다.
      operationId: sector-supply
      parameters:
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        description: "시장 구분 (KOSPI, KOSDAQ)"
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: 조회 개수
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorSupplyResponse"
              examples:
                sector-supply:
                  value: |-
                    [ {
                      "sectorCode" : "001",
                      "sectorName" : "종합",
                      "netForeignBuyAmount" : 500000000,
                      "netInstBuyAmount" : 1200000000,
                      "foreignConsecutiveBuyDays" : 3,
                      "instConsecutiveBuyDays" : 5
                    }, {
                      "sectorCode" : "002",
                      "sectorName" : "반도체",
                      "netForeignBuyAmount" : -100000000,
                      "netInstBuyAmount" : 300000000,
                      "foreignConsecutiveBuyDays" : 0,
                      "instConsecutiveBuyDays" : 2
                    } ]
  /api/v1/stocks/search/history:
    get:
      tags:
      - Stock Discovery
      summary: 최근 검색어 조회
      description: 최근 검색어 조회
      operationId: stock-search-history
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-search-history457412190"
              examples:
                stock-search-history:
                  value: "[ ]"
    delete:
      tags:
      - Stock Discovery
      summary: 최근 검색어 개별 삭제
      description: 최근 검색어 개별 삭제
      operationId: stock-search-history-delete
      parameters:
      - name: keyword
        in: query
        description: 삭제할 검색어
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-v1-stocks-search-history486549215"
            examples:
              stock-search-history-delete:
                value: keyword=%EC%82%BC%EC%84%B1%EC%A0%84%EC%9E%90
      responses:
        "204":
          description: "204"
  /api/v1/stocks/{ticker}/returns:
    get:
      tags:
      - Stock Price
      summary: 종목 수익률 조회
      description: 종목 수익률 조회
      operationId: stock-returns
      parameters:
      - name: ticker
        in: path
        description: 종목 티커
        required: true
        schema:
          type: string
      - name: period
        in: query
        description: "조회 기간 (1W, 1M, 1Y 등)"
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-ticker-returns1293285194"
              examples:
                stock-returns:
                  value: |-
                    {
                      "ticker" : "AAPL",
                      "period" : "1Y",
                      "stockReturnRate" : 15.5,
                      "benchmarkReturnRate" : 10.2
                    }
  /api/v1/stocks/search/history/all:
    delete:
      tags:
      - Stock Discovery
      summary: 최근 검색어 전체 삭제
      description: 최근 검색어 전체 삭제
      operationId: stock-search-history-clear
      responses:
        "204":
          description: "204"
  /api/v1/stocks/{ticker}/prices/history:
    get:
      tags:
      - Stock Price
      summary: 차트용 시세 데이터 조회
      description: 차트용 시세 데이터 조회
      operationId: stock-price-history
      parameters:
      - name: ticker
        in: path
        description: 종목 티커
        required: true
        schema:
          type: string
      - name: period
        in: query
        description: "조회 기간 (1W, 1M, 1Y, ALL 등)"
        required: false
        schema:
          type: string
      - name: frequency
        in: query
        description: "데이터 주기 (DAILY, WEEKLY, MONTHLY)"
        required: false
        schema:
          type: string
      - name: includeBenchmark
        in: query
        description: 벤치마크 포함 여부
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-ticker-prices-history-1525844804"
              examples:
                stock-price-history:
                  value: |-
                    {
                      "ticker" : "AAPL",
                      "prices" : [ {
                        "date" : "2024-01-01",
                        "open" : 100,
                        "high" : 110,
                        "low" : 90,
                        "close" : 105,
                        "adjClose" : 105,
                        "volume" : 1000
                      } ],
                      "benchmarks" : [ ]
                    }
  /api/v1/watchlist/groups/{groupId}/items:
    get:
      tags:
      - Watchlist
      summary: 관심 종목 목록 조회
      description: 관심 종목 목록 조회
      operationId: watchlist-item-list
      parameters:
      - name: groupId
        in: path
        description: 그룹 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-watchlist-groups-groupId-items-332631838"
              examples:
                watchlist-item-list:
                  value: |-
                    {
                      "groupName" : "테크주",
                      "items" : [ {
                        "isinCode" : "KR7005930003",
                        "name" : "삼성전자",
                        "currentPrice" : 70000,
                        "fluctuationRate" : -1.2,
                        "rsi" : 45,
                        "rsiStatus" : "중립",
                        "aiInsight" : "AI 요약 내용..."
                      } ]
                    }
    post:
      tags:
      - Watchlist
      summary: 관심 종목 추가
      description: 관심 종목 추가
      operationId: watchlist-item-add
      parameters:
      - name: groupId
        in: path
        description: 그룹 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api-v1-watchlist-groups-groupId-items1982699150"
            examples:
              watchlist-item-add:
                value: |-
                  {
                    "isinCode" : "KR7005930003"
                  }
      responses:
        "204":
          description: "204"
components:
  schemas:
    api-v1-stocks-popular1050024950:
      type: array
      description: 인기 검색어 목록
      items:
        oneOf:
        - type: object
        - type: boolean
        - type: string
        - type: number
    LoginRequest:
      title: LoginRequest
      required:
      - email
      - loginType
      - nickname
      type: object
      properties:
        loginType:
          type: string
          description: "로그인 타입 (GOOGLE, KAKAO, NAVER)"
        nickname:
          type: string
          description: 닉네임
        email:
          type: string
          description: 이메일
    api-v1-watchlist-groups-groupId-items1982699150:
      required:
      - isinCode
      type: object
      properties:
        isinCode:
          type: string
          description: 종목 ISIN 코드
    SectorRankingResponse:
      title: SectorRankingResponse
      type: array
      description: 섹터 랭킹 리스트
      items:
        required:
        - currentPrice
        - fluctuationRate
        - isOverheated
        - sectorCode
        - sectorName
        type: object
        properties:
          sectorCode:
            type: string
            description: 섹터 코드
          fluctuationRate:
            type: number
            description: 평균 등락률
          currentPrice:
            type: number
            description: 현재 지수
          sectorName:
            type: string
            description: 섹터명
          isOverheated:
            type: boolean
            description: 과열 여부
        description: 섹터 랭킹 리스트
    api-v1-watchlist-groups288370516:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: 그룹 이름
    api-v1-stocks-search412068969:
      required:
      - empty
      - first
      - last
      - number
      - numberOfElements
      - pageable
      - size
      type: object
      properties:
        number:
          type: number
          description: 현재 페이지 번호
        size:
          type: number
          description: 페이지 사이즈
        numberOfElements:
          type: number
          description: 현재 페이지 엘리먼트 수
        last:
          type: boolean
          description: 마지막 페이지 여부
        pageable:
          type: string
          description: 페이징 정보
        sort:
          required:
          - empty
          - sorted
          - unsorted
          type: object
          properties:
            unsorted:
              type: boolean
              description: 미정렬 여부
            sorted:
              type: boolean
              description: 정렬 여부
            empty:
              type: boolean
              description: 정렬 정보 비어있음 여부
        first:
          type: boolean
          description: 첫 번째 페이지 여부
        content:
          type: array
          items:
            required:
            - marketType
            - name
            - sectorName
            - status
            - ticker
            type: object
            properties:
              ticker:
                type: string
                description: 티커
              name:
                type: string
                description: 종목명
              sectorName:
                type: string
                description: 섹터명
              marketType:
                type: string
                description: 마켓 타입
              status:
                type: string
                description: 종목 상태
        empty:
          type: boolean
          description: 결과 비어있음 여부
    api-v1-stocks-new-listings686579750:
      type: array
      items:
        required:
        - marketType
        - name
        - sectorName
        - status
        - ticker
        type: object
        properties:
          ticker:
            type: string
            description: 티커
          name:
            type: string
            description: 종목명
          sectorName:
            type: string
            description: 섹터명
          marketType:
            type: string
            description: 마켓 타입
          status:
            type: string
            description: 종목 상태
    api-v1-watchlist-groups-groupId-items-332631838:
      required:
      - groupName
      type: object
      properties:
        groupName:
          type: string
          description: 그룹 이름
        items:
          type: array
          items:
            required:
            - aiInsight
            - currentPrice
            - fluctuationRate
            - isinCode
            - name
            - rsi
            - rsiStatus
            type: object
            properties:
              fluctuationRate:
                type: number
                description: 등락률
              name:
