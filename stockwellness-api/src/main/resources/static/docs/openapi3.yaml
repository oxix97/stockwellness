openapi: 3.0.1
info:
  title: Stockwellness API
  description: 자산 배분 시뮬레이터 및 AI 예측 서비스 API 명세서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/v1/admin/health:
    get:
      tags:
      - Admin
      summary: 시스템 헬스 체크
      description: "DB, Redis, Kafka의 연결 상태를 통합 조회합니다."
      operationId: admin-health
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-admin-health178451426"
              examples:
                admin-health:
                  value: |-
                    {
                      "status" : "UP",
                      "components" : {
                        "kafka" : "UP",
                        "db" : "UP",
                        "redis" : "UP"
                      }
                    }
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: 로그인
      description: 소셜 로그인 정보를 통해 액세스 토큰 및 리프레시 토큰을 발급받습니다.
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              auth-login:
                value: |-
                  {
                    "email" : "test@example.com",
                    "nickname" : "tester",
                    "loginType" : "GOOGLE"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                auth-login:
                  value: |-
                    {
                      "accessToken" : "access.token.dummy",
                      "refreshToken" : "refresh.token.dummy",
                      "memberId" : 1,
                      "email" : "test@example.com",
                      "nickname" : "tester"
                    }
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 서버에서 리프레시 토큰을 삭제합니다.
      operationId: auth-logout
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
  /api/v1/auth/reissue:
    post:
      tags:
      - Auth
      summary: 토큰 재발급
      description: 리프레시 토큰을 사용하여 새로운 액세스 토큰을 발급받습니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReissueRequest"
            examples:
              auth-reissue:
                value: |-
                  {
                    "refreshToken" : "refresh.token.dummy"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReissueResponse"
              examples:
                auth-reissue:
                  value: |-
                    {
                      "accessToken" : "new.access.token",
                      "refreshToken" : "new.refresh.token"
                    }
  /api/v1/sectors/{sectorCode}:
    get:
      tags:
      - Sector
      summary: 섹터 상세 정보 조회
      description: "특정 섹터의 상세 인사이트, 기술적 지표, 주도주 정보를 조회합니다."
      operationId: sector-detail
      parameters:
      - name: sectorCode
        in: path
        description: 섹터 코드
        required: true
        schema:
          type: string
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorDetailResponse"
              examples:
                sector-detail:
                  value: |-
                    {
                      "sectorCode" : "001",
                      "sectorName" : "조선/해운",
                      "baseDate" : "2026-02-26",
                      "currentPrice" : 2500.5,
                      "fluctuationRate" : 3.45,
                      "technicalIndicators" : {
                        "ma5" : 2400.0,
                        "ma20" : 2350.0,
                        "ma60" : null,
                        "ma120" : null,
                        "rsi14" : 65.5,
                        "macd" : null,
                        "macdSignal" : null,
                        "bollingerUpper" : null,
                        "bollingerMid" : null,
                        "bollingerLower" : null,
                        "adx" : null,
                        "plusDi" : null,
                        "minusDi" : null,
                        "alignmentStatus" : null,
                        "isGoldenCross" : null,
                        "isDeadCross" : null,
                        "isMacdCross" : null
                      },
                      "isOverheated" : true,
                      "diagnosisMessage" : "현재 섹터는 과열 구간에 진입했습니다. 과매수 상태입니다.",
                      "leadingStocks" : [ {
                        "name" : "삼성중공업",
                        "ticker" : "010140",
                        "fluctuationRate" : 5.2,
                        "tradeVolume" : 1500000,
                        "transactionAmt" : 12000000000
                      } ]
                    }
  /api/v1/stocks/new-listings:
    get:
      tags:
      - Stock Discovery
      summary: 신규 상장 종목 조회
      description: 신규 상장 종목 조회
      operationId: stock-new-listings
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-new-listings686579750"
              examples:
                stock-new-listings:
                  value: |-
                    [ {
                      "ticker" : "T1",
                      "name" : "New Stock",
                      "marketType" : "KOSPI",
                      "sectorName" : "기타",
                      "status" : "ACTIVE"
                    } ]
  /api/v1/stocks/popular:
    get:
      tags:
      - Stock Discovery
      summary: 인기 검색어 조회
      description: 인기 검색어 조회
      operationId: stock-popular-search
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-popular1050024950"
              examples:
                stock-popular-search:
                  value: "[ \"삼성전자\", \"애플\", \"엔비디아\" ]"
  /api/v1/stocks/search:
    get:
      tags:
      - Stock Discovery
      summary: 종목 통합 검색
      description: 티커 또는 종목명으로 주식을 검색합니다.
      operationId: stock-search
      parameters:
      - name: keyword
        in: query
        description: 검색어 (티커 또는 종목명)
        required: true
        schema:
          type: string
      - name: marketType
        in: query
        description: "마켓 타입 (KOSPI, KOSDAQ 등)"
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: "종목 상태 (ACTIVE, HALTED 등)"
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: 페이지 번호 (0부터 시작)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 사이즈
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-search412068969"
              examples:
                stock-search:
                  value: |-
                    {
                      "content" : [ {
                        "ticker" : "005930",
                        "name" : "삼성전자",
                        "marketType" : "KOSPI",
                        "sectorName" : "전기전자",
                        "status" : "ACTIVE"
                      } ],
                      "pageable" : "INSTANCE",
                      "size" : 1,
                      "number" : 0,
                      "sort" : {
                        "empty" : true,
                        "unsorted" : true,
                        "sorted" : false
                      },
                      "numberOfElements" : 1,
                      "first" : true,
                      "last" : true,
                      "empty" : false
                    }
  /api/v1/watchlist/groups:
    get:
      tags:
      - Watchlist
      summary: 관심 그룹 목록 조회
      description: 관심 그룹 목록 조회
      operationId: watchlist-group-list
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-watchlist-groups1466762393"
              examples:
                watchlist-group-list:
                  value: |-
                    [ {
                      "id" : 10,
                      "name" : "기본 그룹",
                      "itemCount" : 2
                    }, {
                      "id" : 11,
                      "name" : "테크주",
                      "itemCount" : 5
                    } ]
    post:
      tags:
      - Watchlist
      summary: 관심 그룹 생성
      description: 관심 그룹 생성
      operationId: watchlist-group-create
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api-v1-watchlist-groups288370516"
            examples:
              watchlist-group-create:
                value: |-
                  {
                    "name" : "내 관심 그룹"
                  }
      responses:
        "201":
          description: "201"
  /api/v1/sectors/ranking/fluctuation:
    get:
      tags:
      - Sector
      summary: 섹터 등락률 랭킹 조회
      description: 지정된 날짜의 섹터별 등락률 순위를 조회합니다.
      operationId: sector-ranking
      parameters:
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        description: "시장 구분 (KOSPI, KOSDAQ)"
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: 조회 개수
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorRankingResponse"
              examples:
                sector-ranking:
                  value: |-
                    [ {
                      "sectorCode" : "001",
                      "sectorName" : "종합",
                      "currentPrice" : 2500.5,
                      "fluctuationRate" : 3.45,
                      "isOverheated" : false
                    }, {
                      "sectorCode" : "002",
                      "sectorName" : "반도체",
                      "currentPrice" : 1200.3,
                      "fluctuationRate" : -1.2,
                      "isOverheated" : true
                    } ]
  /api/v1/sectors/ranking/supply:
    get:
      tags:
      - Sector
      summary: 섹터 수급 랭킹 조회
      description: 외국인/기관 순매수 금액 및 연속 매수 일수 기반의 섹터 순위를 조회합니다.
      operationId: sector-supply
      parameters:
      - name: date
        in: query
        description: 조회 날짜 (yyyy-MM-dd)
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        description: "시장 구분 (KOSPI, KOSDAQ)"
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: 조회 개수
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorSupplyResponse"
              examples:
                sector-supply:
                  value: |-
                    [ {
                      "sectorCode" : "001",
                      "sectorName" : "종합",
                      "netForeignBuyAmount" : 500000000,
                      "netInstBuyAmount" : 1200000000,
                      "foreignConsecutiveBuyDays" : 3,
                      "instConsecutiveBuyDays" : 5
                    }, {
                      "sectorCode" : "002",
                      "sectorName" : "반도체",
                      "netForeignBuyAmount" : -100000000,
                      "netInstBuyAmount" : 300000000,
                      "foreignConsecutiveBuyDays" : 0,
                      "instConsecutiveBuyDays" : 2
                    } ]
  /api/v1/stocks/search/history:
    get:
      tags:
      - Stock Discovery
      summary: 최근 검색어 조회
      description: 최근 검색어 조회
      operationId: stock-search-history
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-search-history457412190"
              examples:
                stock-search-history:
                  value: "[ ]"
    delete:
      tags:
      - Stock Discovery
      summary: 최근 검색어 개별 삭제
      description: 최근 검색어 개별 삭제
      operationId: stock-search-history-delete
      parameters:
      - name: keyword
        in: query
        description: 삭제할 검색어
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-v1-portfolios-portfolioId-analysis-correlation486549215"
            examples:
              stock-search-history-delete:
                value: keyword=%EC%82%BC%EC%84%B1%EC%A0%84%EC%9E%90
      responses:
        "204":
          description: "204"
  /api/v1/stocks/{ticker}/returns:
    get:
      tags:
      - Stock Price
      summary: 종목 수익률 조회
      description: 종목 수익률 조회
      operationId: stock-returns
      parameters:
      - name: ticker
        in: path
        description: 종목 티커
        required: true
        schema:
          type: string
      - name: period
        in: query
        description: "조회 기간 (1W, 1M, 1Y 등)"
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-stocks-ticker-returns1293285194"
              examples:
                stock-returns:
                  value: |-
                    {
                      "ticker" : "AAPL",
                      "period" : "1Y",
                      "stockReturnRate" : 15.5,
                      "benchmarkReturnRate" : 10.2
                    }
  /api/v1/portfolios/{portfolioId}/advice/latest:
    get:
      tags:
      - Portfolio
      summary: 최신 AI 리밸런싱 조언 조회
      description: 최신 AI 리밸런싱 조언 조회
      operationId: portfolio-advice-latest
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-portfolios-portfolioId-advice-latest-701553720"
              examples:
                portfolio-advice-latest:
                  value: |-
                    {
                      "content" : "상세 조언 내용입니다.",
                      "action" : "REBALANCE",
                      "createdAt" : "2026-03-11T19:38:52.777171"
                    }
  /api/v1/portfolios/{portfolioId}/analysis/backtest:
    post:
      tags:
      - Portfolio Analysis
      summary: 포트폴리오 백테스팅 시뮬레이션
      description: 적립식(DCA) 또는 거치식 전략으로 과거 성과를 시뮬레이션합니다.
      operationId: portfolio-analysis-backtest
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
            examples:
              portfolio-analysis-backtest:
                value: |-
                  {
                    "strategy" : "DCA",
                    "amount" : 1000000,
                    "benchmarkTicker" : "KOSPI"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResponse"
              examples:
                portfolio-analysis-backtest:
                  value: |-
                    {
                      "dailyResults" : [ {
                        "date" : "2024-01-01",
                        "totalValue" : 1000000,
                        "totalInvested" : 1000000,
                        "returnRate" : 0,
                        "benchmarkReturnRate" : 0
                      }, {
                        "date" : "2024-01-02",
                        "totalValue" : 1050000,
                        "totalInvested" : 1000000,
                        "returnRate" : 0,
                        "benchmarkReturnRate" : 0
                      } ]
                    }
  /api/v1/portfolios/{portfolioId}/analysis/correlation:
    get:
      tags:
      - Portfolio Analysis
      summary: 포트폴리오 종목 간 상관관계 분석
      description: 포트폴리오 종목 간 상관관계 분석
      operationId: portfolio-analysis-correlation
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-portfolios-portfolioId-analysis-correlation486549215"
              examples:
                portfolio-analysis-correlation:
                  value: |-
                    {
                      "AAPL" : {
                        "AAPL" : 1,
                        "TSLA" : 0.85
                      },
                      "TSLA" : {
                        "AAPL" : 0.85,
                        "TSLA" : 1
                      }
                    }
  /api/v1/portfolios/{portfolioId}/analysis/diversification:
    get:
      tags:
      - Portfolio Analysis
      summary: 포트폴리오 비중 분석 (자산군/업종/국가)
      description: 포트폴리오 비중 분석 (자산군/업종/국가)
      operationId: portfolio-analysis-diversification
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioDiversificationResponse"
              examples:
                portfolio-analysis-diversification:
                  value: |-
                    {
                      "totalValue" : 1000000,
                      "assetRatios" : [ {
                        "name" : "STOCK",
                        "value" : 70.0
                      }, {
                        "name" : "CASH",
                        "value" : 30.0
                      } ],
                      "sectorRatios" : [ {
                        "name" : "IT",
                        "value" : 40.0
                      }, {
                        "name" : "금융",
                        "value" : 30.0
                      } ],
                      "countryRatios" : [ {
                        "name" : "KR",
                        "value" : 60.0
                      }, {
                        "name" : "US",
                        "value" : 40.0
                      } ]
                    }
  /api/v1/portfolios/{portfolioId}/analysis/rebalancing:
    get:
      tags:
      - Portfolio Analysis
      summary: 포트폴리오 리밸런싱 가이드
      description: 포트폴리오 리밸런싱 가이드
      operationId: portfolio-analysis-rebalancing
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioRebalancingResponse"
              examples:
                portfolio-analysis-rebalancing:
                  value: |-
                    {
                      "totalValue" : 2000,
                      "items" : [ {
                        "symbol" : "AAPL",
                        "currentWeight" : 80,
                        "targetWeight" : 60,
                        "diffWeight" : -20,
                        "currentQuantity" : 10,
                        "recommendedQuantity" : -2.5,
                        "currentPrice" : 160,
                        "expectedTradeAmount" : -400.0
                      } ]
                    }
  /api/v1/portfolios/{portfolioId}/analysis/valuation:
    get:
      tags:
      - Portfolio Analysis
      summary: 포트폴리오 가치 및 수익률 분석
      description: 포트폴리오 가치 및 수익률 분석
      operationId: portfolio-analysis-valuation
      parameters:
      - name: portfolioId
        in: path
        description: 포트폴리오 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioValuationResponse"
              examples:
                portfolio-analysis-valuation:
                  value: |-
                    {
                      "totalPurchaseAmount" : 2000,
                      "currentTotalValue" : 2100,
                      "totalProfitLoss" : 100,
                      "totalReturnRate" : 5.0,
                      "dailyProfitLoss" : 50,
                      "dailyReturnRate" : 2.44,
                      "mdd" : 15.5,
                      "sharpeRatio" : 1.2,
                      "beta" : 0.95
                    }
  /api/v1/stocks/search/history/all:
    delete:
      tags:
      - Stock Discovery
      summary: 최근 검색어 전체 삭제
      description: 최근 검색어 전체 삭제
      operationId: stock-search-history-clear
      responses:
        "204":
          description: "204"
  /api/v1/stocks/{ticker}/prices/history:
    get:
      tags:
