spring:
  cache:
    type: none
  config:
    activate:
      on-profile: test
  batch:
    job:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 0
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    properties:
      max.block.ms: 500 # 연결 대기 시간을 0.5초로 극단적으로 단축
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: "dummy-key"
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: dummy-kakao-client-id
            client-secret: dummy-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
          google:
            client-id: dummy-google-client-id
            client-secret: dummy-google-client-secret
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

decorator:
  datasource:
    p6spy:
      enable-logging: false

jwt:
  secret-key: "dGhpcy1pcy10ZXN0LXNlY3JldC1rZXktZm9yLXN0b2Nrd2VsbG5lc3MtcHJvamVjdC13aGljaC1pcy1zYWZl"
  access-token-expiry-ms: 3600000
  refresh-token-expiry-ms: 86400000

krx:
  service-key: "dummy-krx-service-key"
  base-url: "http://localhost:8080"

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: "dummy-kis-service-key"
  app-secret: "dummy-kis-secret-key"

app:
  ai:
    enabled: true

management:
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
