spring:
  config:
    activate:
      on-profile: test
  batch:
    job:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
  ai:
    openai:
      api-key: "dummy-key"
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: dummy-kakao-client-id
            client-secret: dummy-kakao-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

decorator:
  datasource:
    p6spy:
      enable-logging: false

jwt:
  secret-key: "dGhpcy1pcy10ZXN0LXNlY3JldC1rZXktZm9yLXN0b2Nrd2VsbG5lc3MtcHJvamVjdC13aGljaC1pcy1zYWZl"
  access-token-expiry-ms: 3600000
  refresh-token-expiry-ms: 86400000

krx:
  service-key: "dummy-krx-service-key"
  base-url: "http://localhost:8080"
