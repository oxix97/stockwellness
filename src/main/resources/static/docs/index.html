<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Stockwellness API Docs</title>
    <link rel="stylesheet" type="text/css" href="/webjars/swagger-ui/swagger-ui.css" >
    <link rel="icon" type="image/png" href="/webjars/swagger-ui/favicon-32x32.png" sizes="32x32" />
    <style>
        html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin:0; background: #fafafa; }
    </style>
</head>
<body>
<div id="swagger-ui"></div>

<script src="/webjars/swagger-ui/swagger-ui-bundle.js"> </script>
<script src="/webjars/swagger-ui/swagger-ui-standalone-preset.js"> </script>
<script>
    window.onload = function() {
        // Stockwellness API 명세 파일 로드 설정
        const ui = SwaggerUIBundle({
            url: "/docs/openapi3.yaml", // [핵심] 우리가 만든 파일 경로를 하드코딩
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "StandaloneLayout",
            // 한글 태그 정렬을 위한 로직 (선택사항)
            operationsSorter: (a, b) => {
                var order = { 'Auth': 1, 'Member': 2, 'Portfolio': 3, 'System': 99 };
                return (order[a.get("tag")] || 99) - (order[b.get("tag")] || 99);
            }
        });
        window.ui = ui;
    };
</script>
</body>
</html>
