openapi: 3.0.1
info:
  title: Stockwellness API
  description: 자산 배분 시뮬레이터 및 AI 예측 서비스 API 명세서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/v1/portfolios:
    post:
      tags:
      - Portfolio
      summary: 포트폴리오 생성
      description: 새로운 투자 포트폴리오를 생성합니다.
      operationId: portfolio-create
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
            examples:
              portfolio-create:
                value: |-
                  {
                    "name" : "내 연금 포트폴리오",
                    "description" : "은퇴 자금 마련용",
                    "items" : [ {
                      "stockCode" : "AAPL",
                      "pieceCount" : 4,
                      "assetType" : "STOCK"
                    }, {
                      "stockCode" : "KRW",
                      "pieceCount" : 4,
                      "assetType" : "CASH"
                    } ]
                  }
      responses:
        "201":
          description: "201"
  /api/v1/auth/test:
    get:
      tags:
      - System
      summary: 시스템 상태 확인
      description: 서버가 정상적으로 동작 중인지 확인합니다.
      operationId: health-check
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-auth-test-1110985947"
              examples:
                health-check:
                  value: |-
                    {
                      "status" : "ok",
                      "service" : "stockwellness"
                    }
  /api/v1/portfolios/{portfolioId}:
    get:
      tags:
      - Portfolio
      summary: 포트폴리오 상세 조회
      description: 포트폴리오 상세 조회
      operationId: portfolio-get
      parameters:
      - name: portfolioId
        in: path
        description: 조회할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
              examples:
                portfolio-get:
                  value: |-
                    {
                      "id" : 4,
                      "name" : "내 연금 포트폴리오",
                      "description" : "은퇴 자금 마련용",
                      "totalPieces" : 8,
                      "items" : [ {
                        "stockCode" : "AAPL",
                        "pieceCount" : 4,
                        "assetType" : "STOCK",
                        "piece" : 4
                      }, {
                        "stockCode" : "KRW",
                        "pieceCount" : 4,
                        "assetType" : "CASH",
                        "piece" : 4
                      } ]
                    }
    put:
      tags:
      - Portfolio
      summary: 포트폴리오 수정
      description: "포트폴리오의 이름, 설명 및 구성 종목을 수정합니다."
      operationId: portfolio-update
      parameters:
      - name: portfolioId
        in: path
        description: 수정할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
            examples:
              portfolio-update:
                value: |-
                  {
                    "name" : "수정후",
                    "description" : "은퇴 자금 마련용",
                    "items" : [ {
                      "stockCode" : "TSLA",
                      "pieceCount" : 8,
                      "assetType" : "STOCK"
                    } ]
                  }
      responses:
        "204":
          description: "204"
    delete:
      tags:
      - Portfolio
      summary: 포트폴리오 삭제
      description: 포트폴리오를 삭제합니다.
      operationId: portfolio-delete
      parameters:
      - name: portfolioId
        in: path
        description: 삭제할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-v1-portfolios-portfolioId486549215"
            examples:
              portfolio-delete:
                value: _csrf=DWb1rhjf4EzgjqM1vf1y3hN7JHTHVm7gReCzI3H-uogcdmQ4aVDNlnu6hHXN65BWjtBG7iQfCUz3NAzNJ4OCFEOag7F_QVIP
      responses:
        "204":
          description: "204"
components:
  schemas:
    PortfolioUpdateRequest:
      title: PortfolioUpdateRequest
      required:
      - description
      - name
      type: object
      properties:
        name:
          type: string
          description: 수정할 이름
        description:
          type: string
          description: 수정할 설명
        items:
          type: array
          items:
            required:
            - assetType
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 조각 수
              stockCode:
                type: string
                description: 종목 코드
              assetType:
                type: string
                description: 자산 타입
    api-v1-auth-test-1110985947:
      required:
      - service
      - status
      type: object
      properties:
        service:
          type: string
          description: 서비스명
        status:
          type: string
          description: 상태 코드 (ok)
    PortfolioCreateRequest:
      title: PortfolioCreateRequest
      required:
      - description
      - name
      type: object
      properties:
        name:
          type: string
          description: 포트폴리오 이름
        description:
          type: string
          description: 설명
        items:
          type: array
          items:
            required:
            - assetType
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 보유 조각 수
              stockCode:
                type: string
                description: 종목 코드 (ISIN)
              assetType:
                type: string
                description: 자산 타입 (STOCK/CASH)
    PortfolioResponse:
      title: PortfolioResponse
      required:
      - description
      - id
      - name
      - totalPieces
      type: object
      properties:
        totalPieces:
          type: number
          description: 총 조각 수
        name:
          type: string
          description: 포트폴리오 이름
        description:
          type: string
          description: 설명
        id:
          type: number
          description: 포트폴리오 ID
        items:
          type: array
          items:
            required:
            - assetType
            - piece
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 조각 수
              piece:
                type: number
                description: 조각 (Deprecated 예정)
              stockCode:
                type: string
                description: 종목 코드
              assetType:
                type: string
                description: 자산 타입
    api-v1-portfolios-portfolioId486549215:
      type: object
