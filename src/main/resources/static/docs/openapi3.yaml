openapi: 3.0.1
info:
  title: Stockwellness API
  description: 자산 배분 시뮬레이터 및 AI 예측 서비스 API 명세서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/v1/portfolios:
    post:
      tags:
      - Portfolio
      summary: 포트폴리오 생성
      description: 새로운 투자 포트폴리오를 생성합니다.
      operationId: portfolio-create
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
            examples:
              portfolio-create:
                value: |-
                  {
                    "name" : "내 연금 포트폴리오",
                    "description" : "은퇴 자금 마련용",
                    "items" : [ {
                      "stockCode" : "AAPL",
                      "pieceCount" : 4,
                      "assetType" : "STOCK"
                    }, {
                      "stockCode" : "KRW",
                      "pieceCount" : 4,
                      "assetType" : "CASH"
                    } ]
                  }
      responses:
        "201":
          description: "201"
  /api/v1/stocks:
    get:
      tags:
      - Stock
      summary: 종목 검색
      description: 종목명 또는 티커로 종목을 검색합니다.
      operationId: stock-search
      parameters:
      - name: keyword
        in: query
        description: 검색어 (종목명/티커)
        required: false
        schema:
          type: string
      - name: marketType
        in: query
        description: 시장 구분 (KOSPI/KOSDAQ)
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: 상장 상태 (ACTIVE/DELISTED)
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: 페이지 번호
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-portfolios-portfolioId486549215"
              examples:
                stock-search:
                  value: |-
                    {
                      "content" : [ {
                        "isinCode" : "KR7005930003",
                        "ticker" : "TICKER",
                        "name" : "삼성전자",
                        "marketType" : "KOSPI",
                        "totalShares" : 1000000
                      } ],
                      "pageable" : "INSTANCE",
                      "numberOfElements" : 1,
                      "first" : true,
                      "last" : true,
                      "size" : 1,
                      "number" : 0,
                      "sort" : {
                        "sorted" : false,
                        "unsorted" : true,
                        "empty" : true
                      },
                      "empty" : false
                    }
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: 로그인
      description: 소셜 로그인 정보를 통해 액세스 토큰 및 리프레시 토큰을 발급받습니다.
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              auth-login:
                value: |-
                  {
                    "email" : "test@example.com",
                    "nickname" : "tester",
                    "loginType" : "GOOGLE"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                auth-login:
                  value: |-
                    {
                      "accessToken" : "access.token.dummy",
                      "refreshToken" : "refresh.token.dummy",
                      "memberId" : 1,
                      "email" : "test@example.com",
                      "nickname" : "tester"
                    }
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 서버에서 리프레시 토큰을 삭제합니다.
      operationId: auth-logout
      parameters:
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
  /api/v1/auth/reissue:
    post:
      tags:
      - Auth
      summary: 토큰 재발급
      description: 리프레시 토큰을 사용하여 새로운 액세스 토큰을 발급받습니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReissueRequest"
            examples:
              auth-reissue:
                value: |-
                  {
                    "refreshToken" : "refresh.token.dummy"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReissueResponse"
              examples:
                auth-reissue:
                  value: |-
                    {
                      "accessToken" : "new.access.token",
                      "refreshToken" : "new.refresh.token"
                    }
  /api/v1/portfolios/{portfolioId}:
    get:
      tags:
      - Portfolio
      summary: 포트폴리오 상세 조회
      description: 포트폴리오 상세 조회
      operationId: portfolio-get
      parameters:
      - name: portfolioId
        in: path
        description: 조회할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
              examples:
                portfolio-get:
                  value: |-
                    {
                      "id" : 5,
                      "name" : "내 연금 포트폴리오",
                      "description" : "은퇴 자금 마련용",
                      "totalPieces" : 8,
                      "items" : [ {
                        "stockCode" : "AAPL",
                        "pieceCount" : 4,
                        "assetType" : "STOCK",
                        "piece" : 4
                      }, {
                        "stockCode" : "KRW",
                        "pieceCount" : 4,
                        "assetType" : "CASH",
                        "piece" : 4
                      } ]
                    }
    put:
      tags:
      - Portfolio
      summary: 포트폴리오 수정
      description: "포트폴리오의 이름, 설명 및 구성 종목을 수정합니다."
      operationId: portfolio-update
      parameters:
      - name: portfolioId
        in: path
        description: 수정할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
            examples:
              portfolio-update:
                value: |-
                  {
                    "name" : "수정후",
                    "description" : "은퇴 자금 마련용",
                    "items" : [ {
                      "stockCode" : "TSLA",
                      "pieceCount" : 8,
                      "assetType" : "STOCK"
                    } ]
                  }
      responses:
        "204":
          description: "204"
    delete:
      tags:
      - Portfolio
      summary: 포트폴리오 삭제
      description: 포트폴리오를 삭제합니다.
      operationId: portfolio-delete
      parameters:
      - name: portfolioId
        in: path
        description: 삭제할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-v1-portfolios-portfolioId486549215"
            examples:
              portfolio-delete:
                value: _csrf=5g4txGooF4GSspf31PINXN1wy-_npQUJukfuk5Yoinm9ZIxggGtJ9wxLcra_1KHA5d85OLsW5tfUxGYk2X7X8qIbuU_fVLlU
      responses:
        "204":
          description: "204"
  /api/v1/stocks/{ticker}:
    get:
      tags:
      - Stock
      summary: 종목 상세 조회
      description: 종목 상세 조회
      operationId: stock-get-detail
      parameters:
      - name: ticker
        in: path
        description: 조회할 종목 티커
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockDetailResponse"
              examples:
                stock-get-detail:
                  value: |-
                    {
                      "isinCode" : "KR7005930003",
                      "ticker" : "TICKER",
                      "name" : "삼성전자",
                      "marketType" : "KOSPI",
                      "sector" : null,
                      "totalShares" : 1000000,
                      "baseDate" : "2026-02-05",
                      "closePrice" : 50000,
                      "priceChange" : 0,
                      "fluctuationRate" : 0,
                      "openPrice" : 50000,
                      "highPrice" : 51000,
                      "lowPrice" : 49000,
                      "volume" : 100000,
                      "tradingValue" : 5000000000,
                      "marketCap" : 300000000000000,
                      "rsi14" : 50,
                      "ma20" : 50000
                    }
  /api/v1/portfolios/{portfolioId}/health:
    get:
      tags:
      - Portfolio
      summary: 포트폴리오 건강 진단
      description: 포트폴리오의 수치적 건강 점수와 AI 인사이트를 조회합니다.
      operationId: portfolio-health
      parameters:
      - name: portfolioId
        in: path
        description: 진단할 포트폴리오 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer Access Token
        required: true
        schema:
          type: string
        example: "Bearer {ACCESS_TOKEN}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisResponse"
              examples:
                portfolio-health:
                  value: |-
                    {
                      "overallScore" : 55,
                      "categories" : {
                        "balance" : 35,
                        "defense" : 100,
                        "attack" : 50,
                        "endurance" : 50,
                        "agility" : 40
                      },
                      "stockContributions" : [ ],
                      "summary" : "안정적인 대들보",
                      "insight" : "시가총액이 큰 우량주 중심의 포트폴리오로 매우 안정적입니다.",
                      "nextSteps" : [ "현재 비중을 유지하세요.", "현금 비중을 조금 늘려보세요." ]
                    }
components:
  schemas:
    StockDetailResponse:
      title: StockDetailResponse
      required:
      - baseDate
      - closePrice
      - fluctuationRate
      - highPrice
      - isinCode
      - lowPrice
      - marketCap
      - marketType
      - name
      - openPrice
      - priceChange
      - ticker
      - totalShares
      - tradingValue
      - volume
      type: object
      properties:
        ma20:
          type: number
          description: 20일 이평선
          nullable: true
        priceChange:
          type: number
          description: 대비
        marketCap:
          type: number
          description: 시가총액
        ticker:
          type: string
          description: 티커
        baseDate:
          type: string
          description: 기준일자
        fluctuationRate:
          type: number
          description: 등락률
        openPrice:
          type: number
          description: 시가
        tradingValue:
          type: number
          description: 거래대금
        marketType:
          type: string
          description: 시장 구분
        totalShares:
          type: number
          description: 상장주식수
        volume:
          type: number
          description: 거래량
        lowPrice:
          type: number
          description: 저가
        rsi14:
          type: number
          description: RSI(14)
          nullable: true
        highPrice:
          type: number
          description: 고가
        name:
          type: string
          description: 종목명
        closePrice:
          type: number
          description: 종가
        isinCode:
          type: string
          description: ISIN 코드
    PortfolioUpdateRequest:
      title: PortfolioUpdateRequest
      required:
      - description
      - name
      type: object
      properties:
        name:
          type: string
          description: 수정할 이름
        description:
          type: string
          description: 수정할 설명
        items:
          type: array
          items:
            required:
            - assetType
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 조각 수
              stockCode:
                type: string
                description: 종목 코드
              assetType:
                type: string
                description: 자산 타입
    LoginRequest:
      title: LoginRequest
      required:
      - email
      - loginType
      - nickname
      type: object
      properties:
        loginType:
          type: string
          description: "로그인 타입 (GOOGLE, KAKAO, NAVER)"
        nickname:
          type: string
          description: 닉네임
        email:
          type: string
          description: 이메일
    LoginResponse:
      title: LoginResponse
      required:
      - accessToken
      - email
      - memberId
      - nickname
      - refreshToken
      type: object
      properties:
        nickname:
          type: string
          description: 닉네임
        accessToken:
          type: string
          description: 액세스 토큰
        email:
          type: string
          description: 이메일
        memberId:
          type: number
          description: 회원 ID
        refreshToken:
          type: string
          description: 리프레시 토큰
    PortfolioCreateRequest:
      title: PortfolioCreateRequest
      required:
      - description
      - name
      type: object
      properties:
        name:
          type: string
          description: 포트폴리오 이름
        description:
          type: string
          description: 설명
        items:
          type: array
          items:
            required:
            - assetType
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 보유 조각 수
              stockCode:
                type: string
                description: 종목 코드 (ISIN)
              assetType:
                type: string
                description: 자산 타입 (STOCK/CASH)
    ReissueResponse:
      title: ReissueResponse
      required:
      - accessToken
      - refreshToken
      type: object
      properties:
        accessToken:
          type: string
          description: 새로운 액세스 토큰
        refreshToken:
          type: string
          description: 새로운 리프레시 토큰
    ReissueRequest:
      title: ReissueRequest
      required:
      - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
          description: 리프레시 토큰
    DiagnosisResponse:
      title: DiagnosisResponse
      required:
      - categories
      - insight
      - nextSteps
      - overallScore
      - stockContributions
      - summary
      type: object
      properties:
        nextSteps:
          type: array
          description: AI 추천 개선 단계 리스트
          items:
            oneOf:
            - type: object
            - type: boolean
            - type: string
            - type: number
        summary:
          type: string
          description: "AI 요약 한줄평 (예: 성장하는 궁수)"
        stockContributions:
          type: array
          description: 종목별 기여도 (준비 중)
          items:
            oneOf:
            - type: object
            - type: boolean
            - type: string
            - type: number
        insight:
          type: string
          description: AI 상세 분석 내용
        overallScore:
          type: number
          description: 종합 건강 점수 (0-100)
        categories:
          required:
          - agility
          - attack
          - balance
          - defense
          - endurance
          type: object
          properties:
            balance:
              type: number
              description: 균형성 점수
            defense:
              type: number
              description: 방어력 점수
            attack:
              type: number
              description: 공격력 점수
            agility:
              type: number
              description: 민첩성 점수
            endurance:
              type: number
              description: 지구력 점수
          description: 카테고리별 점수 맵
    PortfolioResponse:
      title: PortfolioResponse
      required:
      - description
      - id
      - name
      - totalPieces
      type: object
      properties:
        totalPieces:
          type: number
          description: 총 조각 수
        name:
          type: string
          description: 포트폴리오 이름
        description:
          type: string
          description: 설명
        id:
          type: number
          description: 포트폴리오 ID
        items:
          type: array
          items:
            required:
            - assetType
            - piece
            - pieceCount
            - stockCode
            type: object
            properties:
              pieceCount:
                type: number
                description: 조각 수
              piece:
                type: number
                description: 조각 (Deprecated 예정)
              stockCode:
                type: string
                description: 종목 코드
              assetType:
                type: string
                description: 자산 타입
    api-v1-portfolios-portfolioId486549215:
      type: object
