name: CD - API

on:
  push:
    tags:
      - 'v*.*.*'
      - 'api-v*.*.*'     # 예: api-v1.0.0
      - 'release-v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/stockwellness-api

jobs:
  # ── 1. API 이미지 빌드 & Push ─────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ github.ref_name }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. n8n Webhook 트리거 (API 배포) ──────────────────────────
  deploy-api:
    name: Trigger API Deployment
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Trigger n8n webhook (비동기 호출)
        run: |
          MSG=$(git log -1 --pretty=%B || echo "Release: ${{ github.ref_name }}")

          JSON_DATA=$(jq -n \
            --arg img "${{ env.IMAGE_API }}" \
            --arg tag "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg msg "$MSG" \
            --arg author "${{ github.actor }}" \
            '{image: $img, tag: $tag, commit: $commit, message: $msg, author: $author}')
          
          # n8n의 Webhook 응답 설정을 'Immediately'로 변경하여 비동기로 호출합니다.
          # 타임아웃을 피하기 위해 대기 로직을 제거하고 요청 성공 여부만 확인합니다.
          curl -s -S -f \
            --max-time 60 \
            --connect-timeout 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d "$JSON_DATA" \
            "${{ secrets.N8N_WEBHOOK_URL }}"

      - name: Done
        run: echo "✅ API 배포 요청 완료 → ${{ env.IMAGE_API }}:${{ github.ref_name }}"
