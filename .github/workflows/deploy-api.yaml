name: CD - API

on:
  push:
    tags:
      - 'v*.*.*'
      - 'api-v*.*.*'     # 예: api-v1.0.0
      - 'release-v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/stockwellness-api

jobs:
  # ── 1. API 이미지 빌드 & Push ─────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ github.ref_name }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. n8n Webhook 트리거 (API 배포) ──────────────────────────
  deploy-api:
    name: Trigger API Deployment
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Trigger n8n webhook (배포 완료 대기)
        run: |
          # 태그 푸시 이벤트에서는 head_commit.message가 비어있으므로 git log로 추출합니다.
          MSG=$(git log -1 --pretty=%B || echo "Release: ${{ github.ref_name }}")

          JSON_DATA=$(jq -n \
            --arg img "${{ env.IMAGE_API }}" \
            --arg tag "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg msg "$MSG" \
            --arg author "${{ github.actor }}" \
            '{image: $img, tag: $tag, commit: $commit, message: $msg, author: $author}')
          
          # curl의 -f 옵션을 제거하고 -s(silent)와 -S(show-error)를 사용하여
          # n8n에서 500 에러를 뱉더라도 쉘이 죽지 않고 상태 코드를 파싱하도록 합니다.
          RESPONSE=$(curl -s -S \
            --max-time 300 \
            --connect-timeout 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d "$JSON_DATA" \
            -w "\nHTTP_STATUS:%{http_code}" \
            "${{ secrets.N8N_WEBHOOK_URL }}")
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "n8n 응답 코드: ${HTTP_STATUS}"
          echo "n8n 응답 내용: ${BODY}"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ 배포 실패 (HTTP ${HTTP_STATUS})"
            exit 1
          fi

      - name: Done
        run: echo "✅ API 배포 완료 → ${{ env.IMAGE_API }}:${{ github.ref_name }}"
