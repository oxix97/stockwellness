name: CD - Batch

on:
  push:
    tags:
      - 'v*.*.*'
      - 'batch-v*.*.*'   # 예: batch-v1.0.0
      - 'release-v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_BATCH: ghcr.io/${{ github.repository_owner }}/stockwellness-batch

jobs:
  # ── 1. Batch 이미지 빌드 & Push ───────────────────────────────
  build-batch:
    name: Build Batch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (batch)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BATCH }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ github.ref_name }}

      - name: Build and push Batch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.batch
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. n8n Webhook 트리거 (Batch 배포) ────────────────────────
  deploy-batch:
    name: Trigger Batch Deployment
    runs-on: ubuntu-latest
    needs: build-batch

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions
      - name: Trigger n8n webhook (배포 완료 대기)
        run: |
          # 태그 푸시 이벤트 환경에 맞춰 git 명령어로 가장 최근 커밋 메시지를 안전하게 가져오거나, 
          # 실패 시 기본값을 할당합니다.
          MSG=$(git log -1 --pretty=%B || echo "Release: ${{ github.ref_name }}")

          JSON_DATA=$(jq -n \
            --arg img "${{ env.IMAGE_BATCH }}" \
            --arg tag "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg msg "$MSG" \
            --arg author "${{ github.actor }}" \
            '{image: $img, tag: $tag, commit: $commit, message: $msg, author: $author}')

          # -f 옵션을 제거하고 -s(silent), -S(show-error)를 사용하여 
          # 500 에러가 나더라도 죽지 않고 응답 코드를 받아오도록 수정합니다.
          RESPONSE=$(curl -s -S \
            --max-time 300 \
            --connect-timeout 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d "$JSON_DATA" \
            -w "\nHTTP_STATUS:%{http_code}" \
            "${{ secrets.N8N_WEBHOOK_BATCH_URL }}")

          # 마지막 줄의 HTTP 상태 코드와 그 앞의 응답 본문을 분리
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "n8n 응답 코드: ${HTTP_STATUS}"
          echo "n8n 응답 내용: ${BODY}"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ 배포 실패 (HTTP ${HTTP_STATUS})"
            exit 1
          fi
