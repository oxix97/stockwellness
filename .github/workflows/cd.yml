name: CD

on:
  push:
    branches: [ main ]        # develop → main 병합 시에만 실행

env:
  REGISTRY: ghcr.io
  IMAGE_API:   ghcr.io/${{ github.repository_owner }}/stockwellness-api
  IMAGE_BATCH: ghcr.io/${{ github.repository_owner }}/stockwellness-batch
  # DEPLOY_DIR 제거 — n8n이 서버 내에서 직접 경로 관리

jobs:
  # ── 1. API 이미지 빌드 & Push ─────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Batch 이미지 빌드 & Push ───────────────────────────────
  build-batch:
    name: Build Batch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (batch)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BATCH }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Batch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.batch
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. n8n 웹훅 트리거 — API Blue-Green 배포 ─────────────────
  # GitHub Actions runner가 Tailscale에 합류 → 내부망 n8n 웹훅 호출
  # n8n(ubuntu-home)이 웹훅 수신 후 Blue-Green 배포 실행
  deploy-api:
    name: Trigger API Blue-Green (n8n via Tailscale)
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags:            tag:github-actions

      - name: Trigger n8n webhook (API)
        run: |
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d '{
              "service":  "api",
              "image":    "${{ env.IMAGE_API }}",
              "tag":      "${{ needs.build-api.outputs.image_tag }}",
              "commit":   "${{ github.sha }}",
              "message":  "${{ github.event.head_commit.message }}",
              "author":   "${{ github.event.head_commit.author.name }}"
            }' \
            "${{ secrets.N8N_WEBHOOK_URL }}"

      - name: Done
        run: echo "✅ n8n API 배포 트리거 완료 → ${{ env.IMAGE_API }}:${{ needs.build-api.outputs.image_tag }}"

  # ── 4. n8n 웹훅 트리거 — Batch 배포 ─────────────────────────
  deploy-batch:
    name: Trigger Batch Deploy (n8n via Tailscale)
    runs-on: ubuntu-latest
    needs: [ build-batch, deploy-api ]   # API 배포 완료 후 순차 실행

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags:            tag:github-actions

      - name: Trigger n8n webhook (Batch)
        run: |
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d '{
              "service":  "batch",
              "image":    "${{ env.IMAGE_BATCH }}",
              "tag":      "${{ needs.build-batch.outputs.image_tag }}",
              "commit":   "${{ github.sha }}",
              "message":  "${{ github.event.head_commit.message }}",
              "author":   "${{ github.event.head_commit.author.name }}"
            }' \
            "${{ secrets.N8N_WEBHOOK_URL }}"

      - name: Done
        run: echo "✅ n8n Batch 배포 트리거 완료 → ${{ env.IMAGE_BATCH }}:${{ needs.build-batch.outputs.image_tag }}"
