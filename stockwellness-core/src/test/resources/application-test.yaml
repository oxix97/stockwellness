spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: "dummy-key"
  kafka:
    bootstrap-servers: localhost:9092
  docker:
    compose:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  h2:
    console:
      enabled: true

jwt:
  secret-key: "dGhpcy1pcy10ZXN0LXNlY3JldC1rZXktZm9yLXN0b2Nrd2VsbG5lc3MtcHJvamVjdC13aGljaC1pcy1zYWZl"
  access-token-expiry-ms: 3600000
  refresh-token-expiry-ms: 86400000

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: "dummy-kis-service-key"
  app-secret: "dummy-kis-secret-key"

management:
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
