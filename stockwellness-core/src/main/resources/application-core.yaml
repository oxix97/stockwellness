spring:
  application.name: stockwellness
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: update
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  threads.virtual.enabled: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: stockwellness-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.stockwellness.domain.*"
  # Spring AI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
      base-url: https://api.openai.com
      # 타임아웃 설정 (Spring AI 1.0.0-M1 기준)
      # 실제로는 RestClientCustomizer나 별도 빈 설정이 확실할 수 있으나, 일단 설정을 시도합니다.


decorator:
  datasource:
    p6spy:
      enable-logging: true


jwt:
  secret-key: ${JWT_SECRET}
  access-token-expiry-ms: 3600000
  refresh-token-expiry-ms: 2592000000

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}

logging:
  level:
    # 1. 전역 설정: 너무 시끄러운 로그는 INFO로 잠재움
    root: INFO

    # 2. 우리 프로젝트 (핵심): 내가 짠 코드의 로그는 다 보여야 함
    org.stockwellness: DEBUG

    # 3. Spring AI & Web (AI 요청/응답 확인용)
    # RestClient의 요청/응답 헤더 및 바디를 보려면 DEBUG 필요
    org.springframework.web.client.RestClient: DEBUG
    org.springframework.ai: DEBUG

    # 4. Apache HTTP (너무 시끄러움 -> WARN 권장)
    # DEBUG로 두면 TCP 패킷(Hex dump)까지 찍혀서 콘솔이 터집니다. 연결 문제 있을 때만 DEBUG.
    org.apache.hc.client5.http: WARN

    # 5. DB Query (P6Spy 사용 시)
    # p6spy가 파라미터 바인딩된 SQL을 보여주므로 Hibernate 원본 로그는 끕니다.
    p6spy: INFO  # P6Spy 자체의 로깅 레벨 (쿼리 로그는 P6Spy 설정파일에서 제어됨)
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

    # 6. Spring Batch (배치 흐름 확인)
    org.springframework.batch: INFO

    # 7. Transaction (트랜잭션 시작/종료 확인 - 필요시 DEBUG)
    org.springframework.transaction: INFO