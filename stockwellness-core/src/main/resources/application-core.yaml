spring:
  application.name: stockwellness
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}
  flyway:
    enabled: false
    baseline-on-migrate: false
    baseline-version: "5"
    out-of-order: true
    validate-on-migrate: false
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 100
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  threads.virtual.enabled: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: stockwellness-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.stockwellness.domain.*"
  # Spring AI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
      base-url: https://api.openai.com
      # 타임아웃 설정 (Spring AI 1.0.0-M1 기준)
      # 실제로는 RestClientCustomizer나 별도 빈 설정이 확실할 수 있으나, 일단 설정을 시도합니다.


decorator:
  datasource:
    p6spy:
      enable-logging: false


jwt:
  secret-key: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}
  refresh-token-expiry-ms: 2592000000

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}

resilience4j:
  ratelimiter:
    instances:
      kisRateLimiter:
        limit-for-period: 1
        limit-refresh-period: 100ms
        timeout-duration: 30s

app:
  ai:
    enabled: ${AI_ENABLED:false}
  frontend-redirect-url: http://localhost:5173/auth/callback


logging:
  level:
    # 1. 전역 설정: 너무 시끄러운 로그는 INFO로 잠재움
    root: INFO

    # 2. 우리 프로젝트 (핵심): 실운영 환경을 고려하여 INFO로 상향
    org.stockwellness: INFO

    # 3. Spring AI & Web (AI 요청/응답 확인용)
    # 디버깅 시에만 DEBUG로 변경 권장
    org.springframework.web.client.RestClient: WARN
    org.springframework.ai: WARN

    # 4. Apache HTTP (너무 시끄러움 -> WARN 권장)
    org.apache.hc.client5.http: WARN

    # 5. DB Query (P6Spy 사용 시)
    p6spy: OFF
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

    # 6. Spring Batch (배치 흐름 확인)
    org.springframework.batch: INFO

    # 7. Transaction (트랜잭션 시작/종료 확인 - 필요시 DEBUG)
    org.springframework.transaction: INFO